<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    
<title>Trading Journal</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="welcome-box">Welcome, <span id="userEmail">Loading...</span>

<button id="logoutBtn" style="float:right">Logout</button>
</div>
<div class="container">
  
<h1>📊 Trading Journal</h1>
<div class="stats">
<div class="card"><h3>Total P&L</h3>
<h2 id="totalPL">0.00</h2></div>
<div class="card"><h3>Total Trades</h3><h2 id="totalTrades">0</h2></div>
<div class="card"><h3>Wins</h3><h2 id="wins">0</h2></div>
<div class="card"><h3>Losses</h3><h2 id="losses">0</h2></div>
<div class="card"><h3>Win Rate</h3><h2 id="winRate">0%</h2></div>
<div class="card"><h3>Balance</h3><h2 id="balance">0.00</h2></div>
</div>
<form class="form-box" onsubmit="event.preventDefault();addTrade();">
<input id="pair" placeholder="Pair" required>
<input id="date" type="date" required>
<input id="trades" type="number" placeholder="Trades" required>
<select id="side"><option>Long</option><option>Short</option></select>
<select id="result"><option>Win</option><option>Loss</option></select>
<input id="pl" type="number" step="0.01" placeholder="P&L" required>
<textarea id="reason" placeholder="Notes"></textarea>
<button type="submit">Add Trade</button></form>
<div class="calendar-box"><div class="calendar-header"><button id="prevMonth" type="button">◀</button><h2 id="monthYear"></h2><button id="nextMonth" type="button">▶</button></div><div class="weekdays"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div><div id="calendar" class="calendar-grid"></div></div>
<table id="tradeTable"><thead><tr><th>Date</th><th>Pair</th><th>Side</th><th>Result</th><th>P&L</th><th>Trades</th><th>Reason</th><th>Action</th></tr></thead><tbody id="tradeBody"></tbody></table>
<button onclick="downloadPDF()">Download PDF</button>
</div>
<script type="module" src="script.js"></script>

<button onclick="login()">Trade History</button>

<script>
window.login=()=>{
location.href="tradehistory.html"

}
</script>



</body></html>
