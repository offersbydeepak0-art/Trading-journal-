<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trading Journal</title>

<link rel="stylesheet" href="style.css">
<script>
console.log("HTML Loaded");
</script>
<!-- PDF Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>

<body>

<div class="container">

<h1>📊 Trading Journal</h1>

<!-- ================= DASHBOARD ================= -->

<div class="stats">

<div class="card">
<h3>Total P&L</h3>
<h2 id="totalPL">0.00</h2>
</div>

<div class="card">
<h3>Total Trades</h3>
<h2 id="totalTrades">0</h2>
</div>

<div class="card">
<h3>Wins</h3>
<h2 id="wins">0</h2>
</div>

<div class="card">
<h3>Losses</h3>
<h2 id="losses">0</h2>
</div>

<div class="card">
<h3>Win Rate</h3>
<h2 id="winRate">0%</h2>
</div>

<div class="card">
<h3>Total BALANCE</h3>
<h2 id="totalL">0.00</h2>
</div>

</div>

<!-- ================= ADD TRADE ================= -->

<form class="form-box" onsubmit="event.preventDefault();addTrade();">

<input
type="text"
id="pair"
placeholder="Pair (BTCUSDT)"
required>

<input
type="date"
id="date"
required>

<input
type="number"
id="trades"
placeholder="Number of Trades"
required>

<select id="side">
<option value="Long">Long</option>
<option value="Short">Short</option>
</select>

<select id="result">
<option value="Win">Win</option>
<option value="Loss">Loss</option>
</select>

<input
type="number"
id="pl"
placeholder="Profit / Loss"
step="0.01"
required>

<textarea
id="reason"
placeholder="Trade Notes"
></textarea>

<button type="submit">
➕ Add Trade
</button>

</form>

<!-- Calendar starts in Part 2 -->



<!-- ================= CALENDAR ================= -->

<div class="calendar-box">

    <div class="calendar-header">
        <button type="button" id="prevMonth">◀</button>
        <h2 id="monthYear"></h2>
        <button type="button" id="nextMonth">▶</button>
    </div>

    <div class="weekdays">
        <div>Sun</div>
        <div>Mon</div>
        <div>Tue</div>
        <div>Wed</div>
        <div>Thu</div>
        <div>Fri</div>
        <div>Sat</div>
    </div>

    <div id="calendar" class="calendar-grid"></div>

</div>

<!-- ================= TRADE HISTORY ================= -->

<div class="table-box">

<h2 style="margin-bottom:15px;text-align:center;">
Trade History
</h2>

<div class="table-responsive">

<table id="tradeTable">

<thead>

<tr>

<th>Date</th>
<th>Pair</th>
<th>Side</th>
<th>Result</th>
<th>P&L</th>
<th>Trades</th>
<th>Reason</th>
<th>Action</th>

</tr>

</thead>

<tbody id="tradeBody">

<!-- Trades added by JavaScript -->

</tbody>

</table>

</div>

<button
type="button"
id="downloadPDF"
onclick="downloadPDF()">

📄 Download PDF

</button>

</div>

<!-- Remaining closing tags and script.js link will be in Part 3 -->


<!-- ================= END CONTAINER ================= -->

</div>

<!-- ================= SCRIPT ================= -->

<script src="script.js"></script>

</body>
</html>
