<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Registration</title>
<style>
body{font-family:Arial,sans-serif;background:#111;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.container{width:340px;background:#222;padding:24px;border-radius:10px}
input,button{width:100%;padding:10px;margin:8px 0;box-sizing:border-box}
button{background:#00e676;border:none;font-weight:bold;cursor:pointer}
a{color:#00e676;cursor:pointer}
#signupForm{display:none}
</style>
</head>
<body>
<div class="container">
<div id="loginForm">
<h2>Login</h2>
<input id="loginEmail" type="email" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p>Don't have an account? <a onclick="showSignup()">Register</a></p>
</div>

<div id="signupForm">
<h2>Register</h2>
<input id="signupEmail" type="email" placeholder="Email">
<input id="signupPassword" type="password" placeholder="Password">
<button onclick="signup()">Register</button>
<p>Already have an account? <a onclick="showLogin()">Login</a></p>
</div>
</div>

<script type="module">
import { auth } from "./firebase.js";
import {createUserWithEmailAndPassword,signInWithEmailAndPassword} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

window.showSignup=()=>{loginForm.style.display="none";signupForm.style.display="block";}
window.showLogin=()=>{signupForm.style.display="none";loginForm.style.display="block";}

window.signup=()=>{
 const e=signupEmail.value.trim(),p=signupPassword.value;
 createUserWithEmailAndPassword(auth,e,p)
 .then(()=>location.href="journal.html")
 .catch(err=>alert(err.message));
}

window.login=()=>{
 const e=loginEmail.value.trim(),p=loginPassword.value;
 signInWithEmailAndPassword(auth,e,p)
 .then(()=>location.href="journal.html")
 .catch(err=>alert(err.message));
}
</script>
</body>
</html>
